name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - foundation/hrms-platform

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ik
          POSTGRES_PASSWORD: ik
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ik -d postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check backend

      - name: Fast SQLite tests
        run: uv run pytest -q -m "not postgres"

      - name: PostgreSQL integration and migration tests
        env:
          IK_TEST_DATABASE_URL: postgresql+asyncpg://ik:ik@127.0.0.1:5432/postgres
        run: uv run pytest -q -m postgres
