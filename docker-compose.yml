services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ik
      POSTGRES_PASSWORD: ik
      POSTGRES_DB: ik
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ik -d ik"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${IK_S3_ACCESS_KEY_ID:?IK_S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${IK_S3_SECRET_ACCESS_KEY:?IK_S3_SECRET_ACCESS_KEY is required}
      MINIO_API_CORS_ALLOW_ORIGIN: ${IK_FRONTEND_BASE_URL:-http://localhost:3000}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${IK_S3_ACCESS_KEY_ID:?IK_S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${IK_S3_SECRET_ACCESS_KEY:?IK_S3_SECRET_ACCESS_KEY is required}
      MINIO_BUCKET: ${IK_S3_BUCKET:-wealthy-falcon-documents}
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
      mc mb --ignore-existing "local/$$MINIO_BUCKET" &&
      mc anonymous set none "local/$$MINIO_BUCKET"
    restart: "no"

  clamav:
    image: clamav/clamav:1.4
    environment:
      CLAMD_CONF_StreamMaxLength: 52428800
    ports:
      - "3310:3310"
    volumes:
      - clamav-signatures:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  minio-data:
  clamav-signatures:
