services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ik
      POSTGRES_PASSWORD: ik
      POSTGRES_DB: ik
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ik -d ik"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
